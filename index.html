<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>خاڵەکانم - دۆمینە | Mam Pola</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 10px;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* Header */
    .header {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .developer-name { font-size: 18px; font-weight: bold; color: #f1c40f; }
    .phone-number { font-size: 13px; color: #3498db; direction: ltr; font-weight: bold; }

    /* Setup Card */
    .setup-card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #333;
    }
    .setup-card input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: #fff;
      font-size: 16px;
      text-align: center;
    }
    .btn-main {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #27ae60;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hidden { display: none !important; }

    /* Score Header */
    .scores-header {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .score-box {
      flex: 1;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 8px 12px;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .score-num { font-size: 24px; font-weight: bold; }
    .score-box.team1 { border-color: #e74c3c; }
    .score-box.team2 { border-color: #3498db; }

    /* Controls */
    .btn-row {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .btn-row button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 13px;
      color: white;
      cursor: pointer;
    }
    .btn-p5 { background: #27ae60; }
    .btn-p10 { background: #2ecc71; }
    .btn-m5 { background: #e74c3c; }
    .btn-m10 { background: #c0392b; }

    /* Main Board Layout */
    .board {
      display: flex;
      gap: 10px;
    }
    .team-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Grid Box (4 big slots for Domino tallying) */
    .grid-box {
      background: #232323;
      border-radius: 12px;
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      border: 2px solid #333;
    }
    .team1 .grid-box { border-color: #c0392b; background: #2c1919; }
    .team2 .grid-box { border-color: #2980b9; background: #19232c; }

    .cell {
      aspect-ratio: 1;
      background: #3b3b3b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
    }
    .team1 .cell { background: #e74c3c; color: #fff; }
    .team2 .cell { background: #3498db; color: #fff; }

  </style>
</head>
<body>

  <div class="app">
    <div class="header">
      <span style="font-size:20px;">☀️</span>
      <div>
        <div class="developer-name">Mam Pola</div>
        <div class="phone-number">07514807205</div>
      </div>
    </div>

    <div id="setup-screen" class="setup-card">
      <input type="text" id="t1-input" placeholder="ناوی گرووپی یەکەم" value="Pola">
      <input type="text" id="t2-input" placeholder="ناوی گرووپی دووەم" value="Hama">
      <button class="btn-main" onclick="startGame()">یاری نوێ</button>
    </div>

    <div id="game-screen" class="hidden">
      
      <div class="scores-header">
        <div class="score-box team1">
          <span class="score-num" id="s1">0</span>
          <span id="name1">Pola</span>
        </div>
        <div class="score-box team2">
          <span class="score-num" id="s2">0</span>
          <span id="name2">Hama</span>
        </div>
      </div>

      <div class="board">
        <div class="team-col team1">
          <div class="btn-row">
            <button class="btn-m10" onclick="updateScore(1, -10)">-10</button>
            <button class="btn-m5" onclick="updateScore(1, -5)">-5</button>
            <button class="btn-p10" onclick="updateScore(1, 10)">+10</button>
            <button class="btn-p5" onclick="updateScore(1, 5)">+5</button>
          </div>
          <div id="grid1"></div>
        </div>

        <div class="team-col team2">
          <div class="btn-row">
            <button class="btn-m10" onclick="updateScore(2, -10)">-10</button>
            <button class="btn-m5" onclick="updateScore(2, -5)">-5</button>
            <button class="btn-p10" onclick="updateScore(2, 10)">+10</button>
            <button class="btn-p5" onclick="updateScore(2, 5)">+5</button>
          </div>
          <div id="grid2"></div>
        </div>
      </div>

      <button class="btn-main" style="background:#333; margin-top:15px;" onclick="resetGame()">یارییەکی تر</button>
    </div>
  </div>

  <script>
    let score1 = 0, score2 = 0;

    function startGame() {
      document.getElementById('name1').innerText = document.getElementById('t1-input').value || 'گرووپی ۱';
      document.getElementById('name2').innerText = document.getElementById('t2-input').value || 'گرووپی ۲';
      
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      renderGrids();
    }

    function updateScore(team, value) {
      if (team === 1) {
        score1 = Math.max(0, score1 + value);
        document.getElementById('s1').innerText = score1;
      } else {
        score2 = Math.max(0, score2 + value);
        document.getElementById('s2').innerText = score2;
      }
      renderGrids();
    }

    function renderGrids() {
      renderTeamGrid('grid1', score1);
      renderTeamGrid('grid2', score2);
    }

    function renderTeamGrid(containerId, score) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      let totalBoxes = Math.max(4, Math.ceil(score / 100));

      for (let b = 0; b < totalBoxes; b++) {
        const boxDiv = document.createElement('div');
        boxDiv.className = 'grid-box';

        let boxScore = Math.min(100, Math.max(0, score - (b * 100)));

        // 4 slots: Slot0 (Top-Left), Slot1 (Top-Right), Slot2 (Bottom-Left), Slot3 (Bottom-Right)
        let slotSymbols = ['', '', '', ''];

        // Slot 0 (Top-Left: 0 - 20 pts)
        if (boxScore >= 20) slotSymbols[0] = '✕';
        else if (boxScore >= 10) slotSymbols[0] = '/';

        // Slot 2 (Bottom-Left: 25 pts)
        if (boxScore >= 25) slotSymbols[2] = 'O';

        // Slot 1 (Top-Right: 30 - 40 pts)
        if (boxScore >= 40) slotSymbols[1] = '✕';
        else if (boxScore >= 30) slotSymbols[1] = '/';

        // Slot 3 (Bottom-Right: 45 pts)
        if (boxScore >= 45) slotSymbols[3] = 'O';

        // Slot 0 second round (50 - 70 pts)
        if (boxScore >= 70) slotSymbols[0] = '✕ O';
        else if (boxScore >= 50) slotSymbols[0] = '✕ /';

        // Slot 1 second round (80 - 100 pts)
        if (boxScore >= 100) slotSymbols[1] = '✕ O';
        else if (boxScore >= 80) slotSymbols[1] = '✕ /';

        // Order of DOM elements: Top-Left, Top-Right, Bottom-Left, Bottom-Right
        const renderOrder = [0, 1, 2, 3];

        for (let idx of renderOrder) {
          const cellDiv = document.createElement('div');
          cellDiv.className = 'cell';
          cellDiv.innerText = slotSymbols[idx];
          boxDiv.appendChild(cellDiv);
        }

        container.appendChild(boxDiv);
      }
    }

    function resetGame() {
      score1 = 0; score2 = 0;
      document.getElementById('s1').innerText = 0;
      document.getElementById('s2').innerText = 0;
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('setup-screen').classList.remove('hidden');
    }
  </script>
</body>
</html>

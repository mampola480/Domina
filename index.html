<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mam Pola | Domino Score</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 10px;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* Header */
    .header {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .developer-name { font-size: 18px; font-weight: bold; color: #f1c40f; }
    .phone-number { font-size: 13px; color: #3498db; direction: ltr; font-weight: bold; }

    /* Setup Screen */
    .setup-card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #333;
    }
    .setup-card input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: #fff;
      font-size: 16px;
      text-align: center;
    }
    .btn-main {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #27ae60;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hidden { display: none !important; }

    /* Score Header */
    .scores-header {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .score-box {
      flex: 1;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 8px 12px;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .score-num { font-size: 26px; font-weight: bold; }
    .score-box.team1 { border-color: #3498db; color: #fff; }
    .score-box.team2 { border-color: #e74c3c; color: #fff; }

    /* Controls */
    .btn-row {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .btn-row button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 13px;
      color: white;
      cursor: pointer;
    }
    .btn-p5 { background: #27ae60; }
    .btn-p10 { background: #2ecc71; }
    .btn-m5 { background: #e74c3c; }
    .btn-m10 { background: #c0392b; }

    /* Board */
    .board {
      display: flex;
      gap: 10px;
    }
    .team-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Grid Box (2 rows x 4 cols) */
    .grid-box {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 6px;
      border: 2px solid #333;
    }
    .team1 .grid-box { border-color: #3498db; }
    .team2 .grid-box { border-color: #e74c3c; }

    .cell {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .team1 .cell { background: #3498db; }
    .team2 .cell { background: #e74c3c; }

  </style>
</head>
<body>

  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="developer-name">Mam Pola</div>
      <span style="font-size:18px;">☀️</span>
    </div>

    <!-- Setup Screen -->
    <div id="setup-screen" class="setup-card">
      <input type="text" id="t1-input" placeholder="ناوی گرووپی یەکەم" value="Hama">
      <input type="text" id="t2-input" placeholder="ناوی گرووپی دووەم" value="Pola">
      <button class="btn-main" onclick="startGame()">یاری نوێ</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden">
      
      <!-- Top Scores -->
      <div class="scores-header">
        <div class="score-box team1">
          <span id="name1">Hama</span>
          <span class="score-num" id="s1">0</span>
        </div>
        <div class="score-box team2">
          <span id="name2">Pola</span>
          <span class="score-num" id="s2">0</span>
        </div>
      </div>

      <!-- Board -->
      <div class="board">
        <!-- Team 1 -->
        <div class="team-col team1">
          <div class="btn-row">
            <button class="btn-p5" onclick="updateScore(1, 5)">5+</button>
            <button class="btn-p10" onclick="updateScore(1, 10)">10+</button>
            <button class="btn-m5" onclick="updateScore(1, -5)">5-</button>
            <button class="btn-m10" onclick="updateScore(1, -10)">10-</button>
          </div>
          <div id="grid1"></div>
        </div>

        <!-- Team 2 -->
        <div class="team-col team2">
          <div class="btn-row">
            <button class="btn-p5" onclick="updateScore(2, 5)">5+</button>
            <button class="btn-p10" onclick="updateScore(2, 10)">10+</button>
            <button class="btn-m5" onclick="updateScore(2, -5)">5-</button>
            <button class="btn-m10" onclick="updateScore(2, -10)">10-</button>
          </div>
          <div id="grid2"></div>
        </div>
      </div>

      <button class="btn-main" style="background:#333; margin-top:15px;" onclick="resetGame()">یارییەکی تر</button>
    </div>
  </div>

  <script>
    let score1 = 0, score2 = 0;

    function startGame() {
      document.getElementById('name1').innerText = document.getElementById('t1-input').value || 'Hama';
      document.getElementById('name2').innerText = document.getElementById('t2-input').value || 'Pola';
      
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      renderGrids();
    }

    function updateScore(team, value) {
      if (team === 1) {
        score1 = Math.max(0, score1 + value);
        document.getElementById('s1').innerText = score1;
      } else {
        score2 = Math.max(0, score2 + value);
        document.getElementById('s2').innerText = score2;
      }
      renderGrids();
    }

    function renderGrids() {
      renderTeamGrid('grid1', score1);
      renderTeamGrid('grid2', score2);
    }

    function renderTeamGrid(containerId, score) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      let totalBoxes = Math.max(4, Math.ceil(score / 100));

      for (let b = 0; b < totalBoxes; b++) {
        const boxDiv = document.createElement('div');
        boxDiv.className = 'grid-box';

        let boxScore = Math.min(100, Math.max(0, score - (b * 100)));

        let topRow = ['', '', '', ''];
        let bottomRow = ['', '', '', ''];

        // Top Row: 10/20, 30/40, 50/60, 70/80
        if (boxScore >= 20) topRow[0] = '✕';
        else if (boxScore >= 10) topRow[0] = '/';

        if (boxScore >= 40) topRow[1] = '✕';
        else if (boxScore >= 30) topRow[1] = '/';

        if (boxScore >= 60) topRow[2] = '✕';
        else if (boxScore >= 50) topRow[2] = '/';

        if (boxScore >= 80) topRow[3] = '✕';
        else if (boxScore >= 70) topRow[3] = '/';

        // Bottom Row: 25, 45, 65, 85
        if (boxScore >= 25) bottomRow[0] = 'O';
        if (boxScore >= 45) bottomRow[1] = 'O';
        if (boxScore >= 65) bottomRow[2] = 'O';
        if (boxScore >= 85) bottomRow[3] = 'O';

        // Render Top Row Cells
        for (let i = 0; i < 4; i++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.innerText = topRow[i];
          boxDiv.appendChild(cell);
        }

        // Render Bottom Row Cells
        for (let i = 0; i < 4; i++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.innerText = bottomRow[i];
          boxDiv.appendChild(cell);
        }

        container.appendChild(boxDiv);
      }
    }

    function resetGame() {
      score1 = 0; score2 = 0;
      document.getElementById('s1').innerText = 0;
      document.getElementById('s2').innerText = 0;
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('setup-screen').classList.remove('hidden');
    }
  </script>
</body>
</html>

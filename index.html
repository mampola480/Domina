<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mam Pola - ژمارەی دۆمینە</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: #1e1e1e;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .header {
            background-color: #2a2a2a;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #ffcc00;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background-color: #333;
            color: #fff;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .mode-btn.active {
            background-color: #ffcc00;
            color: #000;
        }

        .teams-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .team-box {
            flex: 1;
            background-color: #262626;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .team-box.hama { border: 2px solid #0088cc; }
        .team-box.pola { border: 2px solid #e53935; }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px;
        }

        .score-display {
            font-size: 1.6rem;
        }

        .action-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .action-btn:active { opacity: 0.7; }
        .btn-custom { background-color: #333; color: #fff; }
        .btn-tarqa { background-color: #ff9800; color: #000; }
        .btn-undo { background-color: #455a64; color: #fff; }

        .history-box {
            height: 150px;
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 8px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: #aaa;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background-color: #333;
            color: #fff;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        /* Modal / Pop-up for Tarqa & Custom Point */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #262626;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-content input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #121212;
            color: #fff;
            font-size: 1rem;
            text-align: center;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-confirm { background: #4caf50; color: #fff; }
        .btn-cancel { background: #f44336; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        07514807205 Mam Pola ☀️
    </div>

    <div class="mode-buttons">
        <button class="mode-btn active" id="mode-komkan">کۆمکان</button>
        <button class="mode-btn" id="mode-domina">دۆمینه</button>
    </div>

    <div class="teams-container">
        <!-- Team 1 -->
        <div class="team-box hama">
            <div class="team-header">
                <span>Hama</span>
                <span class="score-display" id="score-1">0</span>
            </div>
            <button class="action-btn btn-custom" onclick="openCustomModal(1)">+ خاڵ...</button>
            <button class="action-btn btn-tarqa" onclick="openTarqaModal(1)">🔲 تەرقە</button>
            <button class="action-btn btn-undo" onclick="undo(1)">↩ پاشگەزبوونەوە</button>
            <div class="history-box" id="history-1">هیچ خاڵێک نییە</div>
        </div>

        <!-- Team 2 -->
        <div class="team-box pola">
            <div class="team-header">
                <span>Pola</span>
                <span class="score-display" id="score-2">0</span>
            </div>
            <button class="action-btn btn-custom" onclick="openCustomModal(2)">+ خاڵ...</button>
            <button class="action-btn btn-tarqa" onclick="openTarqaModal(2)">🔲 تەرقە</button>
            <button class="action-btn btn-undo" onclick="undo(2)">↩ پاشگەزبوونەوە</button>
            <div class="history-box" id="history-2">هیچ خاڵێک نییە</div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetGame()">یارییەکی تر</button>
</div>

<!-- Modal for Tarqa -->
<div class="modal" id="tarqaModal">
    <div class="modal-content">
        <h3 id="tarqaTitle" style="text-align: center;">تەرقە</h3>
        <p style="font-size:0.9rem; color:#ccc; text-align:center;">خاڵی دەستی گروپی بەرامبەر بنووسە:</p>
        <input type="number" id="opposingScoreInput" placeholder="خاڵی بەرامبەر">
        <div class="modal-actions">
            <button class="btn-confirm" onclick="confirmTarqa()">تۆمارکردن</button>
            <button class="btn-cancel" onclick="closeModal('tarqaModal')">پاشگەزبوونەوە</button>
        </div>
    </div>
</div>

<!-- Modal for Custom Points -->
<div class="modal" id="customModal">
    <div class="modal-content">
        <h3 id="customTitle" style="text-align: center;">زیادکردنی خاڵ</h3>
        <input type="number" id="customScoreInput" placeholder="ژمارەی خاڵ بنووسە">
        <div class="modal-actions">
            <button class="btn-confirm" onclick="confirmCustomScore()">تۆمارکردن</button>
            <button class="btn-cancel" onclick="closeModal('customModal')">پاشگەزبوونەوە</button>
        </div>
    </div>
</div>

<script>
    let scores = { 1: 0, 2: 0 };
    let history = { 1: [], 2: [] };
    let activeTeam = null;

    function updateUI() {
        document.getElementById('score-1').innerText = scores[1];
        document.getElementById('score-2').innerText = scores[2];

        renderHistory(1);
        renderHistory(2);
    }

    function renderHistory(team) {
        const box = document.getElementById(`history-${team}`);
        if (history[team].length === 0) {
            box.innerHTML = 'هیچ خاڵێک نییە';
        } else {
            box.innerHTML = history[team].map((val, idx) => `<div>${idx + 1}. ${val}</div>`).join('');
        }
    }

    function openCustomModal(team) {
        activeTeam = team;
        document.getElementById('customScoreInput').value = '';
        document.getElementById('customModal').style.display = 'flex';
    }

    function confirmCustomScore() {
        const val = parseInt(document.getElementById('customScoreInput').value);
        if (!isNaN(val) && val > 0) {
            scores[activeTeam] += val;
            history[activeTeam].push(`+${val}`);
            updateUI();
        }
        closeModal('customModal');
    }

    function openTarqaModal(team) {
        activeTeam = team;
        const teamName = team === 1 ? 'Hama' : 'Pola';
        document.getElementById('tarqaTitle').innerText = `${teamName} تەرقەی کرد 🔲`;
        document.getElementById('opposingScoreInput').value = '';
        document.getElementById('tarqaModal').style.display = 'flex';
    }

    function confirmTarqa() {
        const oppVal = parseInt(document.getElementById('opposingScoreInput').value);
        if (!isNaN(oppVal) && oppVal >= 0) {
            scores[activeTeam] += oppVal;
            history[activeTeam].push(`تەرقە (+${oppVal})`);
            updateUI();
        }
        closeModal('tarqaModal');
    }

    function undo(team) {
        if (history[team].length > 0) {
            const last = history[team].pop();
            const match = last.match(/\d+/);
            if (match) {
                const points = parseInt(match[0]);
                scores[team] -= points;
            }
            updateUI();
        }
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function resetGame() {
        if (confirm('دڵنیایت لە دەستپێکردنەوەی یارییەکە؟')) {
            scores = { 1: 0, 2: 0 };
            history = { 1: [], 2: [] };
            updateUI();
        }
    }
</script>
</body>
</html>

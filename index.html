<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mam Pola | Domino & Komkan</title>
  
  <link rel="manifest" href="data:application/manifest+json;utf8,{
    %22name%22:%22Domino%20Mam%20Pola%22,
    %22short_name%22:%22Domino%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%23121212%22,
    %22theme_color%22:%22%23121212%22
  }">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 10px;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* Header */
    .header {
      background: #1e1e1e;
      padding: 10px 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .developer-name { font-size: 18px; font-weight: bold; color: #f1c40f; }
    .phone-number { font-size: 13px; color: #3498db; direction: ltr; font-weight: bold; }

    /* Mode Switcher */
    .mode-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: #aaa;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }
    .mode-btn.active {
      background: #f1c40f;
      color: #121212;
      border-color: #f1c40f;
    }

    /* Setup Screen */
    .setup-card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #333;
    }
    .setup-card input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: #fff;
      font-size: 16px;
      text-align: center;
    }
    .btn-main {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #27ae60;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hidden { display: none !important; }

    /* Score Header */
    .scores-header {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .score-box {
      flex: 1;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 8px 12px;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .score-num { font-size: 26px; font-weight: bold; }
    .score-box.team1 { border-color: #e74c3c; color: #fff; }
    .score-box.team2 { border-color: #3498db; color: #fff; }

    /* Board */
    .board {
      display: flex;
      gap: 10px;
    }
    .team-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Domino Buttons */
    .btn-row {
      display: flex;
      gap: 4px;
    }
    .btn-row button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 13px;
      color: white;
      cursor: pointer;
    }
    .btn-p5 { background: #27ae60; }
    .btn-p10 { background: #2ecc71; }
    .btn-m5 { background: #e74c3c; }
    .btn-m10 { background: #c0392b; }

    /* Domino Grid Box */
    .grid-box {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 6px;
      border: 2px solid #333;
    }
    .team1 .grid-box { border-color: #e74c3c; }
    .team2 .grid-box { border-color: #3498db; }

    .cell {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }
    .team1 .cell { background: #e74c3c; }
    .team2 .cell { background: #3498db; }

    /* Komkan Layout */
    .komkan-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .komkan-btns button {
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 13px;
      color: #fff;
      background: #333;
      cursor: pointer;
    }
    .komkan-btns button.special { background: #d35400; }
    .komkan-btns button.undo { background: #7f8c8d; grid-column: span 2; }

    .komkan-list {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid #333;
      min-height: 200px;
      max-height: 320px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .komkan-item {
      background: #2a2a2a;
      padding: 8px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="header">
      <span style="font-size:18px;">☀️</span>
      <span class="developer-name">Mam Pola</span>
      <span class="phone-number">07514807205</span>
    </div>

    <div class="mode-switch">
      <button class="mode-btn active" id="btn-mode-domino" onclick="switchMode('domino')">دۆمینە</button>
      <button class="mode-btn" id="btn-mode-komkan" onclick="switchMode('komkan')">کۆمکان</button>
    </div>

    <div id="setup-screen" class="setup-card">
      <input type="text" id="t1-input" placeholder="ناوی گرووپی یەکەم" value="Pola">
      <input type="text" id="t2-input" placeholder="ناوی گرووپی دووەم" value="Hama">
      <button class="btn-main" onclick="startGame()">یاری نوێ</button>
    </div>

    <div id="game-screen" class="hidden">
      
      <div class="scores-header">
        <div class="score-box team1">
          <span class="score-num" id="s1">0</span>
          <span id="name1">Pola</span>
        </div>
        <div class="score-box team2">
          <span class="score-num" id="s2">0</span>
          <span id="name2">Hama</span>
        </div>
      </div>

      <div class="board">
        <div class="team-col team1">
          <div class="btn-row domino-only">
            <button class="btn-m10" onclick="addDominoScore(1, -10)">-10</button>
            <button class="btn-m5" onclick="addDominoScore(1, -5)">-5</button>
            <button class="btn-p10" onclick="addDominoScore(1, 10)">+10</button>
            <button class="btn-p5" onclick="addDominoScore(1, 5)">+5</button>
          </div>

          <div class="komkan-btns komkan-only hidden">
            <button onclick="addKomkanScore(1, 5)">+5</button>
            <button onclick="addKomkanScore(1, 10)">+10</button>
            <button onclick="addKomkanScore(1, 25)">+25</button>
            <button onclick="addKomkanScore(1, 50)">+50</button>
            <button class="special" onclick="addKomkanScore(1, 101)">+101</button>
            <button class="special" onclick="promptCustomScore(1)">خاڵ...</button>
            <button class="undo" onclick="undoKomkan(1)">پاشگەزبوونەوە ↩</button>
          </div>

          <div id="grid1" class="domino-only"></div>
          <div id="list1" class="komkan-list komkan-only hidden"></div>
        </div>

        <div class="team-col team2">
          <div class="btn-row domino-only">
            <button class="btn-m10" onclick="addDominoScore(2, -10)">-10</button>
            <button class="btn-m5" onclick="addDominoScore(2, -5)">-5</button>
            <button class="btn-p10" onclick="addDominoScore(2, 10)">+10</button>
            <button class="btn-p5" onclick="addDominoScore(2, 5)">+5</button>
          </div>

          <div class="komkan-btns komkan-only hidden">
            <button onclick="addKomkanScore(2, 5)">+5</button>
            <button onclick="addKomkanScore(2, 10)">+10</button>
            <button onclick="addKomkanScore(2, 25)">+25</button>
            <button onclick="addKomkanScore(2, 50)">+50</button>
            <button class="special" onclick="addKomkanScore(2, 101)">+101</button>
            <button class="special" onclick="promptCustomScore(2)">خاڵ...</button>
            <button class="undo" onclick="undoKomkan(2)">پاشگەزبوونەوە ↩</button>
          </div>

          <div id="grid2" class="domino-only"></div>
          <div id="list2" class="komkan-list komkan-only hidden"></div>
        </div>
      </div>

      <button class="btn-main" style="background:#333; margin-top:15px;" onclick="resetGame()">یارییەکی تر</button>
    </div>
  </div>

  <script>
    let dominoScore1 = 0, dominoScore2 = 0;
    let komkanHistory1 = [], komkanHistory2 = [];
    let currentMode = 'domino';

    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('btn-mode-domino').classList.toggle('active', mode === 'domino');
      document.getElementById('btn-mode-komkan').classList.toggle('active', mode === 'komkan');

      const dominoEls = document.querySelectorAll('.domino-only');
      const komkanEls = document.querySelectorAll('.komkan-only');

      if (mode === 'domino') {
        dominoEls.forEach(el => el.classList.remove('hidden'));
        komkanEls.forEach(el => el.classList.add('hidden'));
      } else {
        dominoEls.forEach(el => el.classList.add('hidden'));
        komkanEls.forEach(el => el.classList.remove('hidden'));
      }

      updateDisplays();
    }

    function startGame() {
      document.getElementById('name1').innerText = document.getElementById('t1-input').value || 'Pola';
      document.getElementById('name2').innerText = document.getElementById('t2-input').value || 'Hama';
      
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      updateDisplays();
    }

    /* --- Domino Functions --- */
    function addDominoScore(team, value) {
      if (team === 1) dominoScore1 = Math.max(0, dominoScore1 + value);
      else dominoScore2 = Math.max(0, dominoScore2 + value);
      updateDisplays();
    }

    /* --- Komkan Functions --- */
    function addKomkanScore(team, val) {
      if (team === 1) komkanHistory1.push(val);
      else komkanHistory2.push(val);
      updateDisplays();
    }

    function promptCustomScore(team) {
      let val = prompt("خاڵەکە بنووسە:");
      if (val && !isNaN(val)) {
        addKomkanScore(team, parseInt(val));
      }
    }

    function undoKomkan(team) {
      if (team === 1) komkanHistory1.pop();
      else komkanHistory2.pop();
      updateDisplays();
    }

    /* --- Display Updates --- */
    function updateDisplays() {
      if (currentMode === 'domino') {
        document.getElementById('s1').innerText = dominoScore1;
        document.getElementById('s2').innerText = dominoScore2;
        renderDominoGrid('grid1', dominoScore1);
        renderDominoGrid('grid2', dominoScore2);
      } else {
        let sum1 = komkanHistory1.reduce((a, b) => a + b, 0);
        let sum2 = komkanHistory2.reduce((a, b) => a + b, 0);
        document.getElementById('s1').innerText = sum1;
        document.getElementById('s2').innerText = sum2;

        renderKomkanList('list1', komkanHistory1);
        renderKomkanList('list2', komkanHistory2);
      }
    }

    function renderDominoGrid(containerId, score) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      let totalBoxes = Math.max(4, Math.ceil(score / 100));

      for (let b = 0; b < totalBoxes; b++) {
        const boxDiv = document.createElement('div');
        boxDiv.className = 'grid-box';
        let boxScore = Math.min(100, Math.max(0, score - (b * 100)));

        let topRow = ['', '', '', ''];
        let bottomRow = ['', '', '', ''];

        if (boxScore >= 20) topRow[0] = '✕';
        else if (boxScore >= 10) topRow[0] = '/';

        if (boxScore >= 25) bottomRow[0] = 'O';

        if (boxScore >= 40) topRow[1] = '✕';
        else if (boxScore >= 30) topRow[1] = '/';

        if (boxScore >= 45) bottomRow[1] = 'O';

        if (boxScore >= 60) topRow[2] = '✕';
        else if (boxScore >= 50) topRow[2] = '/';

        if (boxScore >= 65) bottomRow[2] = 'O';

        if (boxScore >= 80) topRow[3] = '✕';
        else if (boxScore >= 70) topRow[3] = '/';

        if (boxScore >= 85) bottomRow[3] = 'O';

        for (let i = 0; i < 4; i++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.innerText = topRow[i];
          boxDiv.appendChild(cell);
        }

        for (let i = 0; i < 4; i++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.innerText = bottomRow[i];
          boxDiv.appendChild(cell);
        }

        container.appendChild(boxDiv);
      }
    }

    function renderKomkanList(containerId, history) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      if (history.length === 0) {
        container.innerHTML = '<div style="color:#666; font-size:13px; text-align:center; padding-top:20px;">هیچ خاڵێک نییە</div>';
        return;
      }
      history.forEach((val, idx) => {
        const item = document.createElement('div');
        item.className = 'komkan-item';
        item.innerHTML = `<span>دەست ${idx + 1}</span><span>+${val}</span>`;
        container.appendChild(item);
      });
      container.scrollTop = container.scrollHeight;
    }

    function resetGame() {
      dominoScore1 = 0; dominoScore2 = 0;
      komkanHistory1 = []; komkanHistory2 = [];
      updateDisplays();
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('setup-screen').classList.remove('hidden');
    }

    /* PWA Support */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          const CACHE_NAME = 'domino-v3';
          self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./']))));
          self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
      });
    }
  </script>
</body>
</html>

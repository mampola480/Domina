<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mam Pola 07514807205 - ژمارەی دۆمینە و کۆمکان</title>
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --bg-inner: #21262d;
            --accent-gold: #f59e0b;
            --team-hama: #38bdf8;
            --team-pola: #f43f5e;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --btn-add: #22c55e;
            --btn-sub: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 12px;
        }

        .app-wrapper {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header-bar {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .mode-switcher {
            display: flex;
            background: var(--bg-inner);
            padding: 4px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            gap: 4px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .team-card {
            background: var(--bg-inner);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 2px solid transparent;
        }

        .team-card.hama { border-color: rgba(56, 189, 248, 0.4); }
        .team-card.pola { border-color: rgba(244, 63, 94, 0.4); }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }

        .team-name-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-align: right;
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hama .team-name-btn { color: var(--team-hama); }
        .pola .team-name-btn { color: var(--team-pola); }

        .score-badge {
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            padding: 4px 0;
            color: var(--text-primary);
        }

        /* Domino Custom Plus/Minus Control */
        .domino-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
        }

        .score-row span {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .btn-plus, .btn-minus {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-plus { background-color: var(--btn-add); }
        .btn-minus { background-color: var(--btn-sub); }

        .action-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-top: 4px;
        }

        .btn-tarqa {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
        }

        .btn-undo {
            background: #334155;
            color: #cbd5e1;
        }

        .history-box {
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 6px;
            overflow-y: auto;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 6px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            color: var(--text-secondary);
        }

        .btn-reset {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-inner);
            color: var(--text-primary);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 16px;
        }

        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 18px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .num-input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        .modal-btns { display: flex; gap: 8px; }
        .modal-btns button {
            flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .btn-save { background: #22c55e; color: #fff; }
        .btn-close { background: #ef4444; color: #fff; }
    </style>
</head>
<body>

<div class="app-wrapper">

    <div class="header-bar">
        <span>☀️ Mam Pola 07514807205</span>
    </div>

    <div class="mode-switcher">
        <button class="mode-btn" id="btn-komkan" onclick="switchMode('komkan')">کۆمکان</button>
        <button class="mode-btn active" id="btn-domina" onclick="switchMode('domina')">دۆمینه</button>
    </div>

    <div class="teams-grid">

        <div class="team-card hama">
            <div class="team-header">
                <button class="team-name-btn" onclick="changeTeamName(1)">
                    <span id="name-display-1">Hama</span> ✏️
                </button>
                <span style="font-size:0.7rem; color:var(--text-secondary);">گروپی ١</span>
            </div>
            <div class="score-badge" id="score-1">0</div>

            <div class="domino-controls" id="controls-1"></div>

            <div class="history-box" id="history-1"></div>
        </div>

        <div class="team-card pola">
            <div class="team-header">
                <button class="team-name-btn" onclick="changeTeamName(2)">
                    <span id="name-display-2">Pola</span> ✏️
                </button>
                <span style="font-size:0.7rem; color:var(--text-secondary);">گروپی ٢</span>
            </div>
            <div class="score-badge" id="score-2">0</div>

            <div class="domino-controls" id="controls-2"></div>

            <div class="history-box" id="history-2"></div>
        </div>

    </div>

    <button class="btn-reset" onclick="resetAll()">🔄 دەستپێکردنەوەی یاری</button>

</div>

<div class="modal-overlay" id="inputModal">
    <div class="modal-card">
        <div style="font-weight:bold; text-align:center; color:var(--accent-gold);" id="modalTitle">نوسینی خاڵ</div>
        <input type="number" id="modalInput" class="num-input" placeholder="0" inputmode="numeric">
        <div class="modal-btns">
            <button class="btn-save" onclick="saveModalData()">تۆمارکردن</button>
            <button class="btn-close" onclick="closeModal()">داخستن</button>
        </div>
    </div>
</div>

<script>
    let currentMode = 'domina';
    let teamNames = { 1: 'Hama', 2: 'Pola' };
    let scores = { 1: 0, 2: 0 };
    let history = { 1: [], 2: [] };
    let activeTeam = null;
    let modalType = '';

    function changeTeamName(team) {
        const newName = prompt("ناوی گروپی نوێ بنووسە:", teamNames[team]);
        if (newName && newName.trim() !== "") {
            teamNames[team] = newName.trim();
            document.getElementById(`name-display-${team}`).innerText = teamNames[team];
        }
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('btn-komkan').classList.toggle('active', mode === 'komkan');
        document.getElementById('btn-domina').classList.toggle('active', mode === 'domina');
        renderControls();
    }

    function renderControls() {
        [1, 2].forEach(team => {
            const box = document.getElementById(`controls-${team}`);
            if (currentMode === 'domina') {
                box.innerHTML = `
                    ${[5, 10, 25, 50].map(val => `
                        <div class="score-row">
                            <button class="btn-minus" onclick="changeScore(${team}, -${val})">-</button>
                            <span>${val}</span>
                            <button class="btn-plus" onclick="changeScore(${team}, ${val})">+</button>
                        </div>
                    `).join('')}
                    <button class="action-btn" onclick="openModal(${team}, 'custom')">✏️ خاڵی دەستکاریکراو</button>
                    <button class="action-btn btn-undo" onclick="undoScore(${team})">↩ پاشگەزبوونەوە</button>
                `;
            } else {
                box.innerHTML = `
                    <button class="action-btn" onclick="openModal(${team}, 'custom')">➕ خاڵی دەستکاریکراو</button>
                    <button class="action-btn btn-tarqa" onclick="openModal(${team}, 'tarqa')">🔲 تەرقە</button>
                    <button class="action-btn btn-undo" onclick="undoScore(${team})">↩ پاشگەزبوونەوە</button>
                `;
            }
        });
        updateUI();
    }

    function changeScore(team, val) {
        scores[team] += val;
        const text = val > 0 ? `+${val}` : `${val}`;
        history[team].push({ val, text });
        updateUI();
    }

    function updateUI() {
        document.getElementById('score-1').innerText = scores[1];
        document.getElementById('score-2').innerText = scores[2];
        document.getElementById('name-display-1').innerText = teamNames[1];
        document.getElementById('name-display-2').innerText = teamNames[2];
        renderHistory(1);
        renderHistory(2);
    }

    function renderHistory(team) {
        const box = document.getElementById(`history-${team}`);
        if (!history[team] || history[team].length === 0) {
            box.innerHTML = '<div style="text-align: center; color: #555; padding-top: 30px;">خاڵێک نییە</div>';
            return;
        }
        box.innerHTML = history[team].map((item, idx) => `
            <div class="history-item">
                <span>جەولەی ${idx + 1}</span>
                <span style="font-weight:bold; color:var(--accent-gold);">${item.text}</span>
            </div>
        `).reverse().join('');
    }

    function openModal(team, type) {
        activeTeam = team;
        modalType = type;
        const tName = teamNames[team];
        
        document.getElementById('modalTitle').innerText = type === 'tarqa' 
            ? `${tName} - تۆمارکردنی تەرقە 🔲` 
            : `${tName} - دیاریکردنی خاڵ`;
            
        document.getElementById('modalInput').value = '';
        document.getElementById('inputModal').style.display = 'flex';
        document.getElementById('modalInput').focus();
    }

    function saveModalData() {
        const val = parseInt(document.getElementById('modalInput').value);
        if (!isNaN(val) && val !== 0 && activeTeam) {
            if (modalType === 'tarqa') {
                scores[activeTeam] += val;
                history[activeTeam].push({ val, text: `تەرقە (+${val})` });
            } else {
                scores[activeTeam] += val;
                history[activeTeam].push({ val, text: val > 0 ? `+${val}` : `${val}` });
            }
            updateUI();
        }
        closeModal();
    }

    function undoScore(team) {
        if (history[team] && history[team].length > 0) {
            const last = history[team].pop();
            scores[team] -= last.val;
            updateUI();
        }
    }

    function closeModal() {
        document.getElementById('inputModal').style.display = 'none';
    }

    function resetAll() {
        if (confirm('دڵنیایت لە دەستپێکردنەوەی یارییەکە؟')) {
            scores = { 1: 0, 2: 0 };
            history = { 1: [], 2: [] };
            updateUI();
        }
    }

    // Init
    switchMode('domina');
</script>
</body>
</html>
